<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>TALUMA 快速銷售紀錄</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
button { font-family: inherit; }
body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #F9EBD7; color: #111C31; min-height: 100vh; padding-bottom: 80px; }
.header { background: #111C31; padding: 16px; text-align: center; position: sticky; top: 0; z-index: 100; border-bottom: 2px solid #21409a; display: flex; flex-direction: column; align-items: center; gap: 8px; }
.header h1 { font-size: 18px; color: #F9EBD7; letter-spacing: 2px; }
.header .subtitle { font-size: 12px; color: #a0a8b8; }
.header .sync-bar { display: flex; align-items: center; gap: 12px; width: 100%; justify-content: space-between; padding-top: 8px; border-top: 1px solid #1a2540; }
.sync-bar .sync-btn { background: #21409a; color: white; border: none; padding: 4px 12px; border-radius: 12px; font-size: 11px; cursor: pointer; transition: all 0.2s; }
.sync-bar .sync-btn:active { background: #192e6e; }
.sync-bar .sync-btn:disabled { background: #666; cursor: not-allowed; }
.sync-status { display: flex; align-items: center; gap: 6px; font-size: 11px; color: #a0a8b8; }
.sync-status .dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }
.sync-status .dot.synced { background: #4CAF50; }
.sync-status .dot.offline { background: #FF9800; }
.sync-status .dot.syncing { background: #21409a; animation: pulse 1s infinite; }
@keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }

.tabs { display: flex; background: #111C31; border-bottom: 1px solid #1a2540; position: sticky; top: 110px; z-index: 99; overflow-x: auto; }
.tab { flex: 1; padding: 12px 8px; text-align: center; font-size: 13px; color: #8890a0; border: none; border-bottom: 2px solid transparent; cursor: pointer; background: transparent; white-space: nowrap; min-width: fit-content; }
.tab.active { color: #F9EBD7; border-bottom-color: #21409a; }

.page { display: none; padding: 16px; }
.page.active { display: block; }

/* === SELL PAGE === */
.section-label { font-size: 12px; color: #10382C; text-transform: uppercase; letter-spacing: 1px; margin: 16px 0 8px; font-weight: bold; }
.section-label:first-child { margin-top: 0; }

.channel-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
.channel-btn { padding: 10px 4px; border-radius: 8px; border: 1px solid #D0D0D0; background: white; color: #111C31; font-size: 13px; text-align: center; cursor: pointer; transition: all 0.15s; }
.channel-btn.selected { background: #21409a; color: white; border-color: #21409a; }

.product-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; }
.product-btn { padding: 12px 8px; border-radius: 8px; border: 1px solid #D0D0D0; background: white; color: #111C31; font-size: 14px; text-align: center; cursor: pointer; transition: all 0.15s; position: relative; }
.product-btn .price { font-size: 11px; color: #888; margin-top: 2px; }
.product-btn .stock-badge { position: absolute; top: 4px; right: 6px; font-size: 10px; background: #eee; color: #666; padding: 1px 6px; border-radius: 10px; }
.product-btn .stock-badge.low { background: #AB1A1A; color: white; }
.product-btn.selected { background: #21409a; border-color: #21409a; color: white; }

.qty-row { display: flex; align-items: center; justify-content: center; gap: 20px; margin: 12px 0; }
.qty-btn { width: 48px; height: 48px; border-radius: 50%; border: 1px solid #D0D0D0; background: white; color: #111C31; font-size: 22px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
.qty-btn:active { background: #21409a; color: white; }
.qty-display { font-size: 32px; font-weight: bold; min-width: 40px; text-align: center; }
.qty-input { font-size: 28px; font-weight: bold; width: 64px; text-align: center; border: 1px solid #D0D0D0; border-radius: 8px; background: white; color: #111C31; padding: 4px; -moz-appearance: textfield; }
.qty-input::-webkit-outer-spin-button, .qty-input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
.series-filter { display: flex; gap: 6px; margin-bottom: 8px; overflow-x: auto; padding-bottom: 4px; flex-wrap: nowrap; }
.series-chip { padding: 5px 12px; border-radius: 16px; border: 1px solid #D0D0D0; background: white; color: #888; font-size: 12px; white-space: nowrap; cursor: pointer; flex-shrink: 0; }
.series-chip.active { background: #21409a; color: white; border-color: #21409a; }

.discount-row { display: flex; gap: 8px; align-items: center; margin: 8px 0; }
.discount-row label { font-size: 13px; color: #666; white-space: nowrap; }
.discount-row input { flex: 1; background: white; border: 1px solid #D0D0D0; border-radius: 8px; padding: 10px; color: #111C31; font-size: 16px; text-align: right; }

.sell-btn { width: 100%; padding: 16px; border-radius: 12px; border: none; background: #21409a; color: white; font-size: 18px; font-weight: bold; cursor: pointer; margin-top: 16px; letter-spacing: 2px; }
.sell-btn:disabled { background: #D0D0D0; color: #999; }
.sell-btn:active:not(:disabled) { background: #192e6e; }

.date-picker-row { display: flex; gap: 8px; align-items: center; margin-bottom: 12px; }
.date-picker-row label { font-size: 13px; color: #666; white-space: nowrap; }
.date-picker-row input[type="text"] { flex: 1; background-color: #fff; border: 1px solid #D0D0D0; border-radius: 8px; padding: 8px 12px; color: #111C31; font-size: 16px; font-family: inherit; min-height: 42px; }
.date-picker-row .today-btn { background: #21409a; color: white; border: none; padding: 8px 12px; border-radius: 8px; font-size: 12px; cursor: pointer; white-space: nowrap; }
.date-picker-row .today-btn:active { background: #192e6e; }

.sale-summary { background: #111C31; border-radius: 8px; padding: 12px; margin-top: 8px; font-size: 14px; color: #a0a8b8; text-align: center; }
.sale-summary .amount { font-size: 24px; color: #F9EBD7; font-weight: bold; }

/* === INVENTORY PAGE === */
.inv-card { background: white; border-radius: 8px; padding: 12px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #e8e0d5; }
.inv-card .name { font-size: 14px; }
.inv-card .detail { font-size: 12px; color: #888; margin-top: 2px; }
.inv-card .stock-num { font-size: 20px; font-weight: bold; text-align: right; }
.inv-card .stock-num.negative { color: #AB1A1A; }
.inv-card .stock-num.low { color: #c47a00; }

.filter-row { display: flex; gap: 6px; margin-bottom: 12px; overflow-x: auto; padding-bottom: 4px; }
.filter-chip { padding: 6px 12px; border-radius: 20px; border: 1px solid #D0D0D0; background: white; color: #666; font-size: 12px; white-space: nowrap; cursor: pointer; }
.filter-chip.active { background: #21409a; color: white; border-color: #21409a; }

/* === LOG PAGE & DATE NAV === */
.log-item { background: white; border-radius: 8px; padding: 10px 12px; margin-bottom: 6px; font-size: 13px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #e8e0d5; }
.log-item .left { flex: 1; }
.log-item .time { font-size: 11px; color: #999; }
.log-item .channel-tag { font-size: 11px; color: #21409a; }
.log-item .amount { font-weight: bold; color: #111C31; }
.log-item .del-btn { color: #ccc; font-size: 18px; padding: 0 4px; cursor: pointer; margin-left: 8px; background: none; border: none; }

.export-btn { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #21409a; background: transparent; color: #21409a; font-size: 14px; cursor: pointer; margin-bottom: 12px; }

.date-nav { display: flex; align-items: center; justify-content: center; gap: 12px; margin-bottom: 16px; padding: 12px; background: white; border-radius: 8px; border: 1px solid #e8e0d5; }
.date-nav button { background: none; border: none; color: #21409a; font-size: 18px; cursor: pointer; padding: 6px; width: 36px; height: 36px; display: flex; align-items: center; justify-content: center; }
.date-nav button:active { background: #eff5ff; border-radius: 50%; }
.date-nav .current-date { font-size: 14px; font-weight: bold; color: #111C31; min-width: 140px; text-align: center; }
.date-nav .today-btn { background: #21409a; color: white; padding: 8px 12px; border-radius: 6px; font-size: 12px; }

.today-summary { background: #111C31; border-radius: 8px; padding: 12px; margin-bottom: 12px; text-align: center; }
.today-summary .total { font-size: 28px; font-weight: bold; color: #F9EBD7; }
.today-summary .count { font-size: 13px; color: #a0a8b8; margin-top: 4px; }

/* === MOVE PAGE === */
.move-info { font-size: 13px; color: #666; margin-bottom: 12px; line-height: 1.6; }

.toggle-section { display: flex; gap: 8px; margin-bottom: 12px; }
.toggle-btn { flex: 1; padding: 10px; border-radius: 8px; border: 1px solid #D0D0D0; background: white; color: #666; font-size: 13px; text-align: center; cursor: pointer; transition: all 0.15s; }
.toggle-btn.active { background: #21409a; color: white; border-color: #21409a; }

.stock-in-hint { font-size: 12px; color: #21409a; margin-bottom: 12px; padding: 8px; background: #eff5ff; border-radius: 6px; }

.move-log-item { background: white; border-radius: 8px; padding: 10px 12px; margin-bottom: 6px; font-size: 12px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #e8e0d5; user-select: none; -webkit-user-select: none; }
.move-log-item .left { flex: 1; }
.move-log-item .time { font-size: 11px; color: #999; margin-top: 2px; }
.move-log-item .del-btn { color: #ccc; font-size: 18px; padding: 0 4px; cursor: pointer; margin-left: 8px; background: none; border: none; }

/* === ANALYSIS PAGE === */
.analysis-section { margin-bottom: 20px; }
.analysis-section h3 { font-size: 14px; color: #111C31; font-weight: bold; margin-bottom: 12px; padding: 0 0 8px 0; border-bottom: 2px solid #21409a; }

.overview-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; margin-bottom: 12px; }
.overview-card { background: #111C31; border-radius: 8px; padding: 12px; text-align: center; }
.overview-card .label { font-size: 11px; color: #a0a8b8; text-transform: uppercase; margin-bottom: 4px; }
.overview-card .value { font-size: 18px; font-weight: bold; color: #F9EBD7; }

.channel-bar-item { display: flex; align-items: center; margin-bottom: 12px; gap: 12px; }
.channel-bar-item .name { font-size: 13px; color: #111C31; min-width: 60px; white-space: nowrap; }
.channel-bar-item .bar { flex: 1; background: #e8e0d5; border-radius: 6px; height: 24px; position: relative; overflow: hidden; }
.channel-bar-item .bar-fill { background: #21409a; height: 100%; display: flex; align-items: center; justify-content: flex-end; padding-right: 8px; color: white; font-size: 11px; font-weight: bold; }
.channel-bar-item .percent { font-size: 12px; color: #666; min-width: 45px; text-align: right; }

.product-rank-item { background: white; border-radius: 8px; padding: 12px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #e8e0d5; }
.product-rank-item .name { font-size: 13px; color: #111C31; flex: 1; }
.product-rank-item .stats { font-size: 12px; color: #666; min-width: 120px; text-align: right; }

.monthly-table { width: 100%; border-collapse: collapse; font-size: 13px; }
.monthly-table thead { background: #111C31; color: #F9EBD7; }
.monthly-table th { padding: 10px 8px; text-align: left; font-weight: bold; border: 1px solid #1a2540; }
.monthly-table td { padding: 10px 8px; border: 1px solid #e8e0d5; }
.monthly-table tbody tr:nth-child(odd) { background: #faf5ee; }

.stock-alert-item { background: white; border-radius: 8px; padding: 12px; margin-bottom: 8px; border-left: 4px solid #AB1A1A; border: 1px solid #e8e0d5; }
.stock-alert-item.low-stock { border-left-color: #c47a00; }
.stock-alert-item .name { font-size: 13px; color: #111C31; font-weight: bold; }
.stock-alert-item .detail { font-size: 12px; color: #666; margin-top: 4px; }

.confirm-modal { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); z-index: 200; display: none; align-items: center; justify-content: center; padding: 24px; }
.confirm-modal.show { display: flex; }
.confirm-box { background: white; border-radius: 12px; padding: 24px; text-align: center; max-width: 320px; width: 100%; }
.confirm-box h3 { color: #111C31; margin-bottom: 12px; }
.confirm-box p { color: #666; font-size: 14px; margin-bottom: 16px; line-height: 1.6; }
.confirm-box .btn-row { display: flex; gap: 8px; }
.confirm-box button { flex: 1; padding: 12px; border-radius: 8px; border: none; font-size: 14px; cursor: pointer; }
.confirm-box .cancel { background: #eee; color: #666; }
.confirm-box .ok { background: #21409a; color: white; }

.form-row { display: flex; flex-direction: column; gap: 6px; margin-bottom: 12px; }
.form-row label { font-size: 12px; color: #666; font-weight: bold; }
.form-row input, .form-row select { background: white; border: 1px solid #D0D0D0; border-radius: 8px; padding: 10px; color: #111C31; font-size: 14px; }

.toast { position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%); background: #111C31; color: #F9EBD7; padding: 10px 24px; border-radius: 20px; font-size: 14px; font-weight: bold; z-index: 300; opacity: 0; transition: opacity 0.3s; pointer-events: none; }
.toast.show { opacity: 1; }

/* === SORT CONTROLS === */
.sort-row { display: flex; gap: 6px; margin-bottom: 8px; overflow-x: auto; padding-bottom: 4px; }
.sort-chip { padding: 5px 10px; border-radius: 16px; border: 1px solid #D0D0D0; background: white; color: #888; font-size: 11px; white-space: nowrap; cursor: pointer; }
.sort-chip.active { background: #111C31; color: #F9EBD7; border-color: #111C31; }

/* === ADD PRODUCT MODAL === */
.add-product-modal { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); z-index: 200; display: none; align-items: flex-end; justify-content: center; }
.add-product-modal.show { display: flex; }
.add-product-sheet { background: white; border-radius: 16px 16px 0 0; padding: 24px; width: 100%; max-height: 80vh; overflow-y: auto; }
.add-product-sheet h3 { color: #111C31; margin-bottom: 16px; }
.add-product-sheet .btn-row { display: flex; gap: 8px; margin-top: 16px; }
.add-product-sheet .cancel { flex: 1; padding: 12px; background: #eee; color: #666; border: none; border-radius: 8px; cursor: pointer; font-size: 14px; }
.add-product-sheet .ok { flex: 1; padding: 12px; background: #21409a; color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 14px; font-weight: bold; }

/* === EDIT MODAL === */
.edit-modal { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); z-index: 200; display: none; align-items: flex-end; justify-content: center; }
.edit-modal.show { display: flex; }
.edit-sheet { background: white; border-radius: 16px 16px 0 0; padding: 24px; width: 100%; max-height: 80vh; overflow-y: auto; }
.edit-sheet h3 { color: #111C31; margin-bottom: 16px; }
.edit-sheet .btn-row { display: flex; gap: 8px; margin-top: 16px; }
.edit-sheet .cancel { flex: 1; padding: 12px; background: #eee; color: #666; border: none; border-radius: 8px; cursor: pointer; font-size: 14px; }
.edit-sheet .ok { flex: 1; padding: 12px; background: #21409a; color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 14px; font-weight: bold; }
.log-item .edit-btn { color: #21409a; font-size: 14px; padding: 0 4px; cursor: pointer; margin-left: 4px; background: none; border: none; }
.inv-card .edit-inv-btn { color: #21409a; font-size: 12px; padding: 2px 8px; cursor: pointer; background: none; border: 1px solid #21409a; border-radius: 12px; margin-left: 8px; }

/* === CHANNEL ARCHIVE SETTINGS === */
.settings-section { margin-top: 24px; padding-top: 16px; border-top: 1px solid #e8e0d5; }
.settings-section h3 { font-size: 14px; color: #111C31; margin-bottom: 12px; }
.archive-item { display: flex; justify-content: space-between; align-items: center; padding: 10px 12px; background: white; border-radius: 8px; margin-bottom: 6px; border: 1px solid #e8e0d5; }
.archive-item .name { font-size: 14px; }
.archive-item .archived-tag { font-size: 11px; color: #999; }
.archive-toggle { padding: 6px 12px; border-radius: 8px; border: 1px solid #D0D0D0; background: white; font-size: 12px; cursor: pointer; }
.archive-toggle.archived { background: #eee; color: #999; }
</style>
</head>
<body>

<div class="header">
  <div style="width: 100%;">
    <h1>TALUMA POS</h1>
    <div class="subtitle">快速銷售紀錄系統</div>
  </div>
  <div class="sync-bar">
    <button type="button" class="sync-btn" id="syncBtn" data-action="manualSync">同步</button>
    <div class="sync-status">
      <span class="dot synced" id="syncDot"></span>
      <span id="syncText">未連線</span>
    </div>
  </div>
</div>

<div class="tabs">
  <button type="button" class="tab active" data-action="switchTab" data-id="sell">賣出</button>
  <button type="button" class="tab" data-action="switchTab" data-id="inventory">庫存</button>
  <button type="button" class="tab" data-action="switchTab" data-id="log">銷售紀錄</button>
  <button type="button" class="tab" data-action="switchTab" data-id="move">調貨</button>
  <button type="button" class="tab" data-action="switchTab" data-id="analysis">分析</button>
</div>

<!-- SELL PAGE -->
<div id="page-sell" class="page active">
  <div class="section-label">銷售日期</div>
  <div class="date-picker-row">
    <input type="text" id="sellDateInput" placeholder="YYYY-MM-DD" maxlength="10" inputmode="numeric" autocomplete="off" data-action-input="sellDate">
    <button type="button" class="today-btn" data-action="sellDateToday">今天</button>
  </div>

  <div class="section-label">通路</div>
  <div class="channel-grid" id="channelGrid"></div>

  <div class="section-label">商品</div>
  <div class="series-filter" id="sellSeriesFilter"></div>
  <div class="product-grid" id="productGrid"></div>
  <div class="section-label">數量</div>
  <div class="qty-row">
    <button type="button" class="qty-btn" data-action="changeQty" data-id="-1">−</button>
    <input type="number" class="qty-input" id="qtyDisplay" value="1" min="1" data-action-input="sellQty">
    <button type="button" class="qty-btn" data-action="changeQty" data-id="1">+</button>
  </div>

  <div class="discount-row">
    <label>讓利金額</label>
    <input type="number" id="discountInput" placeholder="0" value="0">
  </div>

  <div class="sale-summary">
    <div>實收金額</div>
    <div class="amount" id="saleAmount">$0</div>
  </div>

  <button type="button" class="sell-btn" id="sellBtn" disabled data-action="confirmSell">選擇商品</button>
</div>

<!-- INVENTORY PAGE -->
<div id="page-inventory" class="page">
  <button type="button" class="export-btn" data-action="exportInventoryCSV">匯出庫存報表 (CSV)</button>
  <div class="filter-row" id="invFilterRow"></div>
  <div class="sort-row">
    <button type="button" class="sort-chip active" data-action="setInvSort" data-id="default">預設</button>
    <button type="button" class="sort-chip" data-action="setInvSort" data-id="stock-desc">庫存多→少</button>
    <button type="button" class="sort-chip" data-action="setInvSort" data-id="stock-asc">庫存少→多</button>
    <button type="button" class="sort-chip" data-action="setInvSort" data-id="price-desc">價格高→低</button>
    <button type="button" class="sort-chip" data-action="setInvSort" data-id="price-asc">價格低→高</button>
  </div>
  <div id="invList"></div>
  <button type="button" class="export-btn" data-action="openAddProductModal" style="margin-top: 12px; border-color: #21409a; color: #21409a;">+ 新增商品</button>
</div>

<!-- LOG PAGE -->
<div id="page-log" class="page">
  <div class="date-nav">
    <button type="button" data-action="prevDate">«</button>
    <div class="current-date" id="currentDate">2026/03/22 (日)</div>
    <button type="button" data-action="nextDate">»</button>
    <button type="button" class="today-btn" data-action="jumpToToday">今天</button>
  </div>

  <div class="today-summary" id="todaySummary"></div>

  <div style="display: flex; gap: 8px; margin-bottom: 12px;">
    <button type="button" class="export-btn" data-action="exportCSV" style="flex: 1; margin-bottom: 0;">匯出本日</button>
    <button type="button" class="export-btn" data-action="exportAllSalesCSV" style="flex: 1; margin-bottom: 0; border-color: #c47a00; color: #c47a00;">匯出全部</button>
  </div>

  <button type="button" onclick="importHistoricalData()" style="width:100%;padding:10px;border-radius:8px;border:1px solid #AB1A1A;background:transparent;color:#AB1A1A;font-size:13px;cursor:pointer;margin-bottom:12px;">⚠ 重置並匯入試算表歷史資料</button>

  <div class="sort-row">
    <button type="button" class="sort-chip active" data-action="setLogSort" data-id="time-desc">時間新→舊</button>
    <button type="button" class="sort-chip" data-action="setLogSort" data-id="amount-desc">金額高→低</button>
    <button type="button" class="sort-chip" data-action="setLogSort" data-id="amount-asc">金額低→高</button>
    <button type="button" class="sort-chip" data-action="setLogSort" data-id="qty-desc">數量多→少</button>
  </div>

  <div id="logList"></div>
</div>

<!-- MOVE PAGE -->
<div id="page-move" class="page">
  <div class="toggle-section">
    <button type="button" class="toggle-btn active" data-action="setMoveMode" data-id="move">調貨</button>
    <button type="button" class="toggle-btn" data-action="setMoveMode" data-id="stock">進貨到總倉</button>
  </div>

  <div id="moveContainer">

if (Object.keys(inventory).length === 0) {
  ALL_LOCATIONS.forEach(loc => {
    inventory[loc.id] = {};
    PRODUCTS.forEach(p => { inventory[loc.id][p.id] = 0; });
  });
  saveData('inventory', inventory);
}

ALL_LOCATIONS.forEach(loc => {
  if (!inventory[loc.id]) inventory[loc.id] = {};
  PRODUCTS.forEach(p => {
    if (inventory[loc.id][p.id] === undefined) inventory[loc.id][p.id] = 0;
  });
});

function getTotalStock(productId) {
  return Object.values(inventory).reduce((sum, loc) => sum + (loc[productId] || 0), 0);
}

function getUniqueTypes() {
  const types = new Set(PRODUCTS.map(p => p.type));
  return Array.from(types).sort();
}
function getUniqueSeries() {
  const series = new Set(PRODUCTS.map(p => p.series));
  return Array.from(series).sort();
}

function renderSeriesFilter(containerId, stateKey) {
  const container = document.getElementById(containerId);
  if (!container) return;
  const types = getUniqueTypes();
  const current = state[stateKey] || 'all';
  container.innerHTML = [
    `<button type="button" class="series-chip ${current === 'all' ? 'active' : ''}" data-action="setSeriesFilter" data-id="all|${stateKey}">全部</button>`,
    ...types.map(t => `<button type="button" class="series-chip ${current === t ? 'active' : ''}" data-action="setSeriesFilter" data-id="${t}|${stateKey}">${t}</button>`)
  ].join('');
}

function setSeriesFilter(combined) {
  const [series, stateKey] = combined.split('|');
  state[stateKey] = series;
  if (stateKey === 'sellSeries') { renderSeriesFilter('sellSeriesFilter', 'sellSeries'); renderProducts(); }
  else if (stateKey === 'moveSeries') { renderSeriesFilter('moveSeriesFilter', 'moveSeries'); renderMoveProducts(); }
  else if (stateKey === 'stockSeries') { renderSeriesFilter('stockSeriesFilter', 'stockSeries'); renderStockProducts(); }
}

function getFilteredProducts(stateKey) {
  const type = state[stateKey] || 'all';
  return type === 'all' ? PRODUCTS : PRODUCTS.filter(p => p.type === type);
}

function generateProductId() {
  return 'custom-' + Date.now();
}

function formatDate(dateStr) {
  const d = new Date(dateStr + 'T00:00:00');
  const days = ['日', '一', '二', '三', '四', '五', '六'];
  const day = d.getDay();
  const parts = dateStr.split('-');
  return `${parts[0]}/${parts[1]}/${parts[2]} (${days[day]})`;
}

// ===== SYNC HELPERS =====
function updateSyncStatus(status, text) {
  const dot = document.getElementById('syncDot');
  const textEl = document.getElementById('syncText');
  const btn = document.getElementById('syncBtn');

  dot.classList.remove('synced', 'offline', 'syncing');

  if (status === 'synced') {
    dot.classList.add('synced');
    textEl.textContent = '已同步';
    btn.disabled = false;
    syncState.isOnline = true;
  } else if (status === 'offline') {
    dot.classList.add('offline');
    textEl.textContent = APPS_SCRIPT_URL ? '離線模式' : '未連線';
    btn.disabled = !APPS_SCRIPT_URL;
  } else if (status === 'syncing') {
    dot.classList.add('syncing');
    textEl.textContent = '同步中...';
    btn.disabled = true;
  }
}

async function initializeSync() {
  if (!APPS_SCRIPT_URL) {
    updateSyncStatus('offline');
    return;
  }

  updateSyncStatus('syncing');
  try {
    const response = await fetch(`${APPS_SCRIPT_URL}?action=initSheets`);
    if (!response.ok) throw new Error('初始化失敗');
    await fullSync();
    updateSyncStatus('synced');
  } catch(err) {
    console.error('初始化失敗:', err);
    updateSyncStatus('offline');
  }
}

async function fullSync() {
  if (!APPS_SCRIPT_URL || syncState.isSyncing) return;

  syncState.isSyncing = true;
  updateSyncStatus('syncing');

  try {
    // 取得最新的銷售和庫存資料
    const [salesRes, invRes, movesRes] = await Promise.all([
      fetch(`${APPS_SCRIPT_URL}?action=getAllSales`),
      fetch(`${APPS_SCRIPT_URL}?action=getInventory`),
      fetch(`${APPS_SCRIPT_URL}?action=getMoves&date=${new Date().toISOString().slice(0, 10)}`)
    ]);

    if (salesRes.ok && invRes.ok) {
      const salesData = await salesRes.json();
      const invData = await invRes.json();

      // 只在需要時更新本地資料
      if (salesData.sales && salesData.sales.length > salesLog.length) {
        salesLog = salesData.sales;
        saveData('salesLog', salesLog);
      }

      if (invData.inventory && invData.inventory.length > 0) {
        // 合併遠端庫存（遠端有值才覆蓋，不清空本地資料）
        invData.inventory.forEach(item => {
          const loc = LOCATIONS.find(l => l.name === item['來源'] || l.name === item.from);
          if (!loc) return;
          if (!inventory[loc.id]) inventory[loc.id] = {};
          const prod = PRODUCTS.find(p => p.name === item['商品名稱'] || p.name === item.product);
          if (prod && (typeof item.qty === 'number') && item.qty !== 0) {
            inventory[loc.id][prod.id] = item.qty;
          }
        });
        saveData('inventory', inventory);
      }
    }

    syncState.isOnline = true;
    updateSyncStatus('synced');
  } catch(err) {
    console.error('同步失敗:', err);
    updateSyncStatus('offline');
  } finally {
    syncState.isSyncing = false;
  }
}

async function syncToSheets(action, params) {
  if (!APPS_SCRIPT_URL) return;

  try {
    updateSyncStatus('syncing');
    // action 放在 URL query parameter，因為 doPost 用 e.parameter.action 讀取
    const url = APPS_SCRIPT_URL + '?action=' + encodeURIComponent(action);
    // 使用 no-cors 模式：mobile Safari 跟隨 302 redirect 後會得到 opaque response，
    // 導致 response.ok = false，即使資料已成功寫入。
    // no-cors 模式下 response 永遠是 opaque（無法讀取），但請求一定會送出。
    const response = await fetch(url, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain;charset=utf-8' },
      body: JSON.stringify(params),
      mode: 'no-cors'
    });

    // no-cors 回應是 opaque（status=0, ok=false），無法判斷成功與否。
    // 但 Apps Script 只要收到請求就會處理，所以直接視為成功。
    updateSyncStatus('synced');
    return true;
  } catch(err) {
    console.error('同步到 Sheets 失敗:', err);
    updateSyncStatus('offline');
    // 本地資料已保存，稍後會同步
    return false;
  }
}

function renderChannels() {
  const grid = document.getElementById('channelGrid');
  grid.innerHTML = CHANNELS.map(c =>
    `<button type="button" class="channel-btn ${state.selectedChannel === c.id ? 'selected' : ''}" data-action="selectChannel" data-id="${c.id}">${c.name}</button>`
  ).join('');
}

function renderProducts() {
  const grid = document.getElementById('productGrid');
  const filtered = getFilteredProducts('sellSeries');
  grid.innerHTML = filtered.map(p => {
    const total = getTotalStock(p.id);
    const lowClass = total <= 0 ? 'low' : '';
    return `<button type="button" class="product-btn ${state.selectedProduct === p.id ? 'selected' : ''}" data-action="selectProduct" data-id="${p.id}">
      <div class="stock-badge ${lowClass}">${total}</div>
      <div>${p.name}</div>
      <div class="price">$${p.price}</div>
    </button>`;
  }).join('');
}

function renderSellBtn() {
  const btn = document.getElementById('sellBtn');
  const { selectedChannel, selectedProduct, qty } = state;
  if (selectedChannel && selectedProduct) {
    const p = PRODUCTS.find(x => x.id === selectedProduct);
    const discount = parseInt(document.getElementById('discountInput').value) || 0;
    const amount = (p.price * qty) - discount;
    document.getElementById('saleAmount').textContent = `$${amount}`;
    btn.textContent = `賣出 ✓`;
    btn.disabled = false;
  } else {
    document.getElementById('saleAmount').textContent = '$0';
    btn.textContent = '尚未選擇通路和商品';
    btn.disabled = true;
  }
}

function renderInventory() {
  const filterRow = document.getElementById('invFilterRow');
  const locs = ['all', ...LOCATIONS.map(l => l.id)];
  const locNames = { all: '全部', ...Object.fromEntries(LOCATIONS.map(l => [l.id, l.name])) };
  const currentFilter = state.invFilter || 'all';

  filterRow.innerHTML = locs.map(l =>
    `<button type="button" class="filter-chip ${currentFilter === l ? 'active' : ''}" data-action="setInvFilter" data-id="${l}">${locNames[l]}</button>`
  ).join('');

  document.querySelectorAll('#page-inventory .sort-chip').forEach(c => {
    c.classList.toggle('active', c.dataset.id === state.invSort);
  });

  let sortedProducts = [...PRODUCTS];
  const sortMode = state.invSort;
  if (sortMode === 'stock-desc') {
    sortedProducts.sort((a, b) => {
      const sa = currentFilter === 'all' ? getTotalStock(a.id) : (inventory[currentFilter]?.[a.id] || 0);
      const sb = currentFilter === 'all' ? getTotalStock(b.id) : (inventory[currentFilter]?.[b.id] || 0);
      return sb - sa;
    });
  } else if (sortMode === 'stock-asc') {
    sortedProducts.sort((a, b) => {
      const sa = currentFilter === 'all' ? getTotalStock(a.id) : (inventory[currentFilter]?.[a.id] || 0);
      const sb = currentFilter === 'all' ? getTotalStock(b.id) : (inventory[currentFilter]?.[b.id] || 0);
      return sa - sb;
    });
  } else if (sortMode === 'price-desc') {
    sortedProducts.sort((a, b) => b.price - a.price);
  } else if (sortMode === 'price-asc') {
    sortedProducts.sort((a, b) => a.price - b.price);
  }

  const list = document.getElementById('invList');
  let html = '';
  sortedProducts.forEach(p => {
    if (currentFilter === 'all') {
      const total = getTotalStock(p.id);
      const cls = total < 0 ? 'negative' : total <= 2 ? 'low' : '';
      const locs = LOCATIONS.map(l => {
        const q = inventory[l.id]?.[p.id] || 0;
        return q !== 0 ? `${l.name}:${q}` : '';
      }).filter(Boolean).join('、');
      html += `<div class="inv-card">
        <div><div class="name">${p.name}</div><div class="detail">$${p.price}｜${locs || '無庫存'}</div></div>
        <div class="stock-num ${cls}">${total}</div>
      </div>`;
    } else {
      const q = inventory[currentFilter]?.[p.id] || 0;
      if (q !== 0) {
        const cls = q < 0 ? 'negative' : q <= 2 ? 'low' : '';
        html += `<div class="inv-card">
          <div><div class="name">${p.name}</div><div class="detail">$${p.price}</div></div>
          <div style="display:flex;align-items:center;">
            <div class="stock-num ${cls}">${q}</div>
            <button type="button" class="edit-inv-btn" data-action="editInventory" data-id="${currentFilter}|${p.id}">修改</button>
          </div>
        </div>`;
      }
    }
  });
  list.innerHTML = html || '<div style="text-align:center;color:#666;padding:40px;">此地點無庫存</div>';
}

function renderLog() {
  const selectedDate = state.selectedDate;
  const selectedSales = salesLog.filter(s => s.date === selectedDate);
  const totalAmount = selectedSales.reduce((sum, s) => sum + s.amount, 0);
  const totalItems = selectedSales.reduce((sum, s) => sum + s.qty, 0);

  document.getElementById('currentDate').textContent = formatDate(selectedDate);

  document.getElementById('todaySummary').innerHTML = `
    <div class="total">$${totalAmount.toLocaleString()}</div>
    <div class="count">${formatDate(selectedDate)} · ${selectedSales.length} 筆交易，共 ${totalItems} 件商品</div>
  `;

  document.querySelectorAll('#page-log .sort-chip').forEach(c => {
    c.classList.toggle('active', c.dataset.id === state.logSort);
  });

  const logItems = selectedSales.map(s => {
    const realIdx = salesLog.indexOf(s);
    return { ...s, realIdx };
  });

  const logSort = state.logSort;
  if (logSort === 'time-desc') {
    logItems.reverse();
  } else if (logSort === 'amount-desc') {
    logItems.sort((a, b) => b.amount - a.amount);
  } else if (logSort === 'amount-asc') {
    logItems.sort((a, b) => a.amount - b.amount);
  } else if (logSort === 'qty-desc') {
    logItems.sort((a, b) => b.qty - a.qty);
  }

  const list = document.getElementById('logList');
  list.innerHTML = logItems.map(s => {
    return `<div class="log-item">
      <div class="left">
        <div>${s.productName} × ${s.qty}</div>
        <div><span class="channel-tag">${s.channelName}</span> <span class="time">${s.time}</span></div>
      </div>
      <div style="display:flex;align-items:center;">
        <div class="amount">$${s.amount}</div>
        <button type="button" class="edit-btn" data-action="editSale" data-id="${s.realIdx}">✎</button>
        <button type="button" class="del-btn" data-action="deleteSale" data-id="${s.realIdx}">×</button>
      </div>
    </div>`;
  }).join('') || '<div style="text-align:center;color:#666;padding:40px;">該日期無紀錄</div>';
}

function renderAnalysis() {
  const totalRevenue = salesLog.reduce((sum, s) => sum + s.amount, 0);
  const totalTransactions = salesLog.length;
  const totalItems = salesLog.reduce((sum, s) => sum + s.qty, 0);
  const avgValue = totalTransactions > 0 ? Math.floor(totalRevenue / totalTransactions) : 0;

  document.getElementById('analysisTotalRevenue').textContent = `$${totalRevenue.toLocaleString()}`;
  document.getElementById('analysisTotalTransactions').textContent = totalTransactions;
  document.getElementById('analysisTotalItems').textContent = totalItems;
  document.getElementById('analysisAvgValue').textContent = `$${avgValue.toLocaleString()}`;

  const channelRevenue = {};
  CHANNELS.forEach(c => { channelRevenue[c.id] = { name: c.name, revenue: 0 }; });
  salesLog.forEach(s => {
    if (channelRevenue[s.channelId]) {
      channelRevenue[s.channelId].revenue += s.amount;
    }
  });

  const sortedChannels = Object.entries(channelRevenue)
    .map(([id, data]) => ({ ...data, id, revenue: data.revenue }))
    .sort((a, b) => b.revenue - a.revenue);

  const maxRevenue = sortedChannels.length > 0 ? sortedChannels[0].revenue : 1;
  const channelHtml = sortedChannels.map(ch => {
    const percent = maxRevenue > 0 ? ((ch.revenue / totalRevenue) * 100).toFixed(1) : 0;
    const barWidth = maxRevenue > 0 ? ((ch.revenue / maxRevenue) * 100) : 0;
    return `<div class="channel-bar-item">
      <div class="name">${ch.name}</div>
      <div class="bar">
        <div class="bar-fill" style="width: ${barWidth}%">$${ch.revenue.toLocaleString()}</div>
      </div>
      <div class="percent">${percent}%</div>
    </div>`;
  }).join('');
  document.getElementById('analysisChannelRevenue').innerHTML = channelHtml || '<div style="text-align:center;color:#666;padding:20px;">無銷售資料</div>';

  const productSales = {};
  PRODUCTS.forEach(p => { productSales[p.id] = { name: p.name, qty: 0, revenue: 0 }; });
  salesLog.forEach(s => {
    if (productSales[s.productId]) {
      productSales[s.productId].qty += s.qty;
      productSales[s.productId].revenue += s.amount;
    }
  });

  const topProducts = Object.values(productSales)
    .filter(p => p.qty > 0)
    .sort((a, b) => b.qty - a.qty)
    .slice(0, 10);

  const topHtml = topProducts.map((p, idx) => `<div class="product-rank-item">
    <div style="display:flex;align-items:center;gap:8px;">
      <div style="font-weight:bold;color:#21409a;font-size:16px;">${idx + 1}</div>
      <div class="name">${p.name}</div>
    </div>
    <div class="stats">${p.qty} 件 · $${p.revenue.toLocaleString()}</div>
  </div>`).join('');
  document.getElementById('analysisTopProducts').innerHTML = topHtml || '<div style="text-align:center;color:#666;padding:20px;">無銷售資料</div>';

  const monthlyData = {};
  salesLog.forEach(s => {
    const month = s.date.slice(0, 7);
    if (!monthlyData[month]) {
      monthlyData[month] = { revenue: 0, transactions: 0, items: 0 };
    }
    monthlyData[month].revenue += s.amount;
    monthlyData[month].transactions += 1;
    monthlyData[month].items += s.qty;
  });

  const monthlyMonths = Object.keys(monthlyData).sort();
  const monthlyHtml = monthlyMonths.length > 0 ? `<table class="monthly-table">
    <thead>
      <tr>
        <th>月份</th>
        <th>營收</th>
        <th>交易數</th>
        <th>售出件數</th>
      </tr>
    </thead>
    <tbody>
      ${monthlyMonths.map(month => {
        const data = monthlyData[month];
        return `<tr>
          <td>${month}</td>
          <td>$${data.revenue.toLocaleString()}</td>
          <td>${data.transactions}</td>
          <td>${data.items}</td>
        </tr>`;
      }).join('')}
    </tbody>
  </table>` : '<div style="text-align:center;color:#666;padding:20px;">無銷售資料</div>';
  document.getElementById('analysisMonthlyTrend').innerHTML = monthlyHtml;

  const alerts = [];
  PRODUCTS.forEach(p => {
    let hasNegative = false;
    let totalStock = 0;
    LOCATIONS.forEach(loc => {
      const qty = inventory[loc.id]?.[p.id] || 0;
      totalStock += qty;
      if (qty < 0) {
        hasNegative = true;
      }
    });

    if (hasNegative) {
      const details = LOCATIONS.map(loc => {
        const qty = inventory[loc.id]?.[p.id] || 0;
        if (qty < 0) return `${loc.name}: ${qty}`;
        return '';
      }).filter(Boolean).join('、');
      alerts.push({ type: 'negative', name: p.name, detail: `超賣：${details}` });
    }

    if (totalStock > 0 && totalStock <= 2) {
      alerts.push({ type: 'low', name: p.name, detail: `總庫存：${totalStock} 件` });
    }
  });

  const alertsHtml = alerts.length > 0 ? alerts.map(a => `<div class="stock-alert-item ${a.type === 'low' ? 'low-stock' : ''}">
    <div class="name">${a.name}</div>
    <div class="detail">${a.detail}</div>
  </div>`).join('') : '<div style="text-align:center;color:#999;padding:20px;font-size:12px;">暫無庫存警示</div>';
  document.getElementById('analysisStockAlerts').innerHTML = alertsHtml;

  // 庫存快照
  const activeLocs = LOCATIONS.filter(l => !l.archived);
  let snapHtml = `<table class="monthly-table" style="font-size:12px;">
    <thead><tr><th style="text-align:left;">商品</th>${activeLocs.map(l => `<th>${l.name}</th>`).join('')}<th style="font-weight:bold;">合計</th></tr></thead>
    <tbody>`;
  let grandTotal = 0;
  PRODUCTS.forEach(p => {
    let rowTotal = 0;
    const cells = activeLocs.map(l => {
      const q = inventory[l.id]?.[p.id] || 0;
      rowTotal += q;
      const color = q < 0 ? 'color:#c62828;font-weight:bold' : q === 0 ? 'color:#ccc' : '';
      return `<td style="text-align:center;${color}">${q}</td>`;
    }).join('');
    grandTotal += rowTotal;
    const totalColor = rowTotal < 0 ? 'color:#c62828;font-weight:bold' : rowTotal === 0 ? 'color:#ccc' : 'font-weight:bold';
    snapHtml += `<tr><td style="text-align:left;">${p.name}</td>${cells}<td style="text-align:center;${totalColor}">${rowTotal}</td></tr>`;
  });
  snapHtml += `</tbody></table>
    <div style="text-align:right;font-size:12px;color:#666;margin-top:4px;">總庫存：${grandTotal} 件</div>`;
  document.getElementById('analysisInventorySnapshot').innerHTML = snapHtml;
}

function selectMoveTo(id) { state.moveTo = id; renderMoveLocations(); renderMoveBtn(); }

function selectStockProduct(id) { state.stockProduct = id; renderStockProducts(); renderStockBtn(); }
function changeStockQty(d) { state.stockQty = Math.max(1, (parseInt(state.stockQty) || 1) + d); document.getElementById('stockQtyDisplay').value = state.stockQty; }

function setInvSort(s) { state.invSort = s; renderInventory(); }
function setLogSort(s) { state.logSort = s; renderLog(); }

function setMoveMode(mode) {
  state.moveMode = mode;
  const toggles = document.querySelectorAll('.toggle-section .toggle-btn');
  toggles.forEach((t, i) => {
    t.classList.toggle('active', (i === 0 && mode === 'move') || (i === 1 && mode === 'stock'));
  });
  document.getElementById('moveContainer').style.display = mode === 'move' ? 'block' : 'none';
  document.getElementById('stockInContainer').style.display = mode === 'stock' ? 'block' : 'none';
  if (mode === 'stock') {
    setStockDateNow();
    renderSeriesFilter('stockSeriesFilter', 'stockSeries');
    renderStockProducts();
    renderStockBtn();
  } else {
    renderSeriesFilter('moveSeriesFilter', 'moveSeries');
    renderMoveLocations();
    renderMoveProducts();
    renderMoveBtn();
  }

function switchTab(tab) {
  document.querySelectorAll('.tab').forEach((t, i) => {
    const tabs = ['sell', 'inventory', 'log', 'move', 'analysis'];
    t.classList.toggle('active', tabs[i] === tab);
  });
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById('page-' + tab).classList.add('active');
  if (tab === 'inventory') renderInventory();
  if (tab === 'log') renderLog();
  if (tab === 'analysis') { renderAnalysis(); renderChannelArchive(); }
  if (tab === 'move') { setMoveMode('move'); renderSeriesFilter('moveSeriesFilter', 'moveSeries'); renderMoveLocations(); renderMoveProducts(); renderMoveBtn(); renderSeriesFilter('stockSeriesFilter', 'stockSeries'); renderStockProducts(); renderStockBtn(); renderMoveLog(); }
}

function confirmSell() {
  const { selectedChannel, selectedProduct, qty } = state;
  if (!selectedChannel || !selectedProduct) return;

  const channel = CHANNELS.find(c => c.id === selectedChannel);
  const product = PRODUCTS.find(p => p.id === selectedProduct);
  const discount = parseInt(document.getElementById('discountInput').value) || 0;
  const amount = (product.price * qty) - discount;

  // 使用手動輸入的日期（預設今天），驗證格式 YYYY-MM-DD
  const rawSellDate = document.getElementById('sellDateInput').value;
  const sellDate = /^\d{4}-\d{2}-\d{2}$/.test(rawSellDate) ? rawSellDate : formatLocalDate(new Date());
  const sale = {
    date: sellDate,
    time: new Date().toLocaleTimeString('zh-TW', { hour12: false, hour: '2-digit', minute: '2-digit' }),
    channelId: selectedChannel,
    channelName: channel.name,
    productId: selectedProduct,
    productName: product.name,
    qty: qty,
    amount: amount
  };

  // 樂觀更新：先更新本地
  salesLog.push(sale);
  saveData('salesLog', salesLog);

  // 更新庫存
  if (!inventory[selectedChannel]) inventory[selectedChannel] = {};
  inventory[selectedChannel][selectedProduct] = (inventory[selectedChannel][selectedProduct] || 0) - qty;
  saveData('inventory', inventory);

  // 背景同步到 Sheets
  if (APPS_SCRIPT_URL) {
    syncToSheets('addSale', {
      action: 'addSale',
      date: sale.date,
      time: sale.time,
      channel: channel.name,
      product: product.name,
      qty: qty,
      unitPrice: product.price,
      discount: discount,
      amount: amount
    });
  }

  // 重置狀態
  state.selectedChannel = null;
  state.selectedProduct = null;
  state.qty = 1;
  document.getElementById('discountInput').value = '0';
  renderChannels();
  renderProducts();
  renderSellBtn();
  showToast(`✓ ${product.name} 已賣出`);
}

function deleteSale(idx) {
  if (idx < 0 || idx >= salesLog.length) return;
  const sale = salesLog[idx];

  showModal('確認刪除', `確定要刪除 ${sale.productName} 的銷售紀錄嗎？`, () => {
    salesLog.splice(idx, 1);
    saveData('salesLog', salesLog);

    // 恢復庫存
    if (inventory[sale.channelId]) {
      inventory[sale.channelId][sale.productId] = (inventory[sale.channelId][sale.productId] || 0) + sale.qty;
      saveData('inventory', inventory);
    }

    // 背景同步刪除
    if (APPS_SCRIPT_URL) {
      syncToSheets('deleteSale', { action: 'deleteSale', row: idx });
    }

    renderLog();
    showToast('✓ 紀錄已刪除');
  });
}

let editInvState = { locId: null, productId: null };

function editInventory(locId, productId) {
  const product = PRODUCTS.find(p => p.id === productId);
  const loc = ALL_LOCATIONS.find(l => l.id === locId);
  const currentQty = inventory[locId]?.[productId] || 0;

  document.getElementById('editInvQty').value = currentQty;
  document.getElementById('editInvModal').classList.add('show');
  document.getElementById('editInvQty').focus();

}

function closeEditInvModal() {
  document.getElementById('editInvModal').classList.remove('show');
}

function saveEditInv() {
  const { locId, productId } = editInvState;
  const newQty = parseInt(document.getElementById('editInvQty').value);
  if (isNaN(newQty)) { showToast('請輸入數字'); return; }
  inventory[locId][productId] = newQty;
  saveData('inventory', inventory);

  renderInventory();
  renderProducts();

// ===== EDIT SALE =====
let editSaleIdx = -1;

function editSale(idx) {
  if (idx < 0 || idx >= salesLog.length) return;
  const sale = salesLog[idx];
  const product = PRODUCTS.find(p => p.id === sale.productId);
  editSaleIdx = idx;
  document.getElementById('editSaleQty').value = sale.qty;
  const originalTotal = product ? product.price * sale.qty : sale.amount;
  document.getElementById('editSaleDiscount').value = Math.max(0, originalTotal - sale.amount);
  document.getElementById('editSaleModal').classList.add('show');
  document.getElementById('editSaleQty').focus();
}

function closeEditSaleModal() {
  document.getElementById('editSaleModal').classList.remove('show');
  editSaleIdx = -1;
}

function saveEditSale() {
  if (editSaleIdx < 0 || editSaleIdx >= salesLog.length) return;
  const sale = salesLog[editSaleIdx];
  const product = PRODUCTS.find(p => p.id === sale.productId);
  const newQty = parseInt(document.getElementById('editSaleQty').value) || 1;
  const discount = parseInt(document.getElementById('editSaleDiscount').value) || 0;
  const price = product ? product.price : Math.round(sale.amount / sale.qty);

  // 恢復舊庫存
  if (inventory[sale.channelId]) {
    inventory[sale.channelId][sale.productId] = (inventory[sale.channelId][sale.productId] || 0) + sale.qty;
  }
  // 更新銷售紀錄
  sale.qty = newQty;
  sale.amount = (price * newQty) - discount;
  // 扣除新庫存
  if (inventory[sale.channelId]) {
    inventory[sale.channelId][sale.productId] = (inventory[sale.channelId][sale.productId] || 0) - newQty;
  }

  saveData('salesLog', salesLog);
  saveData('inventory', inventory);
  closeEditSaleModal();
  renderLog();
  renderInventory();
  showToast('✓ 銷售紀錄已修改');
}

function confirmMove() {
  const { moveFrom, moveTo, moveProduct, moveQty } = state;
  if (!moveFrom || !moveTo || !moveProduct) return;

  const fromLoc = LOCATIONS.find(l => l.id === moveFrom);
  const toLoc = LOCATIONS.find(l => l.id === moveTo);
  const product = PRODUCTS.find(p => p.id === moveProduct);

  const move = {
    date: formatLocalDate(new Date()),
    time: new Date().toLocaleTimeString('zh-TW', { hour12: false, hour: '2-digit', minute: '2-digit' }),
    from: fromLoc.name,
    to: toLoc.name,
    productId: moveProduct,
    productName: product.name,
    qty: moveQty
  };

  // 樂觀更新
  moveLog.push(move);
  saveData('moveLog', moveLog);

  // 更新庫存
  const parsedMoveQty = parseInt(moveQty) || 1;
  inventory[moveFrom][moveProduct] = (inventory[moveFrom][moveProduct] || 0) - parsedMoveQty;
  inventory[moveTo][moveProduct] = (inventory[moveTo][moveProduct] || 0) + parsedMoveQty;
  saveData('inventory', inventory);

  // 背景同步
  if (APPS_SCRIPT_URL) {
    syncToSheets('addMove', {
      action: 'addMove',
      date: move.date,
      time: move.time,
      type: '調貨',
      product: product.name,
      qty: parsedMoveQty,
      from: fromLoc.name,
      to: toLoc.name
    });
  }

  // 重置
  state.moveFrom = null;
  state.moveTo = null;
  state.moveProduct = null;
  state.moveQty = 1;
  renderMoveLocations();
  renderMoveProducts();
  renderMoveBtn();
  document.getElementById('moveQtyDisplay').value = '1';
  renderMoveLog();
  showToast(`✓ ${product.name} 已調貨`);
}

function deleteMove(idx) {
  if (idx < 0 || idx >= moveLog.length) return;
  const move = moveLog[idx];

  showModal('確認刪除', `確定要刪除這筆調貨紀錄嗎？`, () => {
    moveLog.splice(idx, 1);
    saveData('moveLog', moveLog);

    // 恢復庫存
    const fromId = LOCATIONS.find(l => l.name === move.from)?.id;
    const toId = LOCATIONS.find(l => l.name === move.to)?.id;
    if (fromId && toId) {
      inventory[fromId][move.productId] = (inventory[fromId][move.productId] || 0) + move.qty;
      inventory[toId][move.productId] = (inventory[toId][move.productId] || 0) - move.qty;
      saveData('inventory', inventory);
    }

    // 背景同步
    if (APPS_SCRIPT_URL) {
      syncToSheets('deleteMove', { action: 'deleteMove', row: idx });
    }

    renderMoveLog();
    showToast('✓ 紀錄已刪除');
  });
}

function confirmStockIn() {
  const { stockProduct, stockQty } = state;
  if (!stockProduct) return;

  const rawStockDate = document.getElementById('stockDateInput').value;
  const stockDate = /^\d{4}-\d{2}-\d{2}$/.test(rawStockDate) ? rawStockDate : formatLocalDate(new Date());
  const rawStockTime = document.getElementById('stockTimeInput').value;
  const stockTime = /^\d{2}:\d{2}$/.test(rawStockTime) ? rawStockTime : new Date().toLocaleTimeString('zh-TW', { hour12: false, hour: '2-digit', minute: '2-digit' });

  const product = PRODUCTS.find(p => p.id === stockProduct);
  const move = {
    date: stockDate,
    time: stockTime,
    from: '',
    to: '家（總倉）',
    productId: stockProduct,
    productName: product.name,
    qty: stockQty
  };

  moveLog.push(move);
  saveData('moveLog', moveLog);

  // 增加家的庫存
  const parsedStockQty = parseInt(stockQty) || 1;
  inventory['home'][stockProduct] = (inventory['home'][stockProduct] || 0) + parsedStockQty;
  saveData('inventory', inventory);

  // 背景同步
  if (APPS_SCRIPT_URL) {
    syncToSheets('addStockIn', {
      action: 'addStockIn',
      date: move.date,
      time: move.time,
      product: product.name,
      qty: parsedStockQty
    });
  }

  state.stockProduct = null;
  state.stockQty = 1;
  renderStockProducts();
  renderStockBtn();
  document.getElementById('stockQtyDisplay').value = '1';
  renderMoveLog();
  showToast(`✓ ${product.name} 進貨成功`);
}

function exportCSV() {
  const selectedDate = state.selectedDate;
  const selectedSales = salesLog.filter(s => s.date === selectedDate);

  let csv = '日期,時間,通路,商品,數量,單價,讓利,總銷售額\n';
  selectedSales.forEach(s => {
    const row = `${s.date},${s.time},${s.channelName},${s.productName},${s.qty},${PRODUCTS.find(p => p.id === s.productId)?.price || 0},0,${s.amount}`;
    csv += row + '\n';
  });

  const blob = new Blob(['\uFEFF' + csv], { type: 'text/csv;charset=utf-8' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `TALUMA_銷售_${selectedDate}.csv`;
  a.click();
}

function exportAllSalesCSV() {
  let csv = '日期,時間,通路,商品,數量,單價,讓利,總銷售額\n';
  salesLog.forEach(s => {
    const row = `${s.date},${s.time},${s.channelName},${s.productName},${s.qty},${PRODUCTS.find(p => p.id === s.productId)?.price || 0},0,${s.amount}`;
    csv += row + '\n';
  });

  const blob = new Blob(['\uFEFF' + csv], { type: 'text/csv;charset=utf-8' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `TALUMA_全部銷售_${new Date().toISOString().slice(0, 10)}.csv`;
  a.click();
}

function exportInventoryCSV() {
  const today = new Date().toISOString().slice(0, 10);
  const locIds = ALL_LOCATIONS.map(l => l.id);
  const locNames = Object.fromEntries(ALL_LOCATIONS.map(l => [l.id, l.name]));

  let csv = '商品名稱,單價,系列,' + locIds.map(id => locNames[id]).join(',') + ',總庫存\n';
  PRODUCTS.forEach(p => {
    let row = `${p.name},${p.price},${p.series}`;
    let total = 0;
    locIds.forEach(locId => {
      const qty = inventory[locId]?.[p.id] || 0;
      row += `,${qty}`;
      total += qty;
    });

    row += `,${total}`;
    csv += row + '\n';
  });

  const blob = new Blob(['\uFEFF' + csv], { type: 'text/csv;charset=utf-8' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `TALUMA_庫存_${today}.csv`;
  a.click();
}

function openAddProductModal() {
  renderAddProductModal();
  document.getElementById('newProductName').value = '';
  document.getElementById('newProductPrice').value = '';
  document.getElementById('newProductSeason').value = '';
  document.getElementById('newProductType').value = '';
  document.getElementById('newProductSeries').value = '';
  document.getElementById('addProductModal').classList.add('show');
  document.getElementById('newProductName').focus();
}

function closeAddProductModal() {
  document.getElementById('addProductModal').classList.remove('show');
}

function saveNewProduct() {
  const name = document.getElementById('newProductName').value.trim();
  const price = parseInt(document.getElementById('newProductPrice').value);
  const season = document.getElementById('newProductSeason').value || 'selected';
  const type = document.getElementById('newProductType').value || '其他';
  const series = document.getElementById('newProductSeries').value.trim() || name;

  if (!name) { showToast('請輸入商品名稱'); return; }
  if (!price || price <= 0) { showToast('請輸入正確的單價'); return; }

  const newProduct = {
    id: generateProductId(),
    name: name,
    price: price,
    series: series,
    type: type,
    season: season,
  };

  customProducts.push(newProduct);
  saveData('customProducts', customProducts);

  PRODUCTS.push(newProduct);

  LOCATIONS.forEach(loc => {
    if (!inventory[loc.id]) inventory[loc.id] = {};
    inventory[loc.id][newProduct.id] = 0;
  });
  saveData('inventory', inventory);

  // 背景同步
  if (APPS_SCRIPT_URL) {
    syncToSheets('addProduct', {
      action: 'addProduct',
      id: newProduct.id,
      name: name,
      price: price,
      series: series
    });
  }

  closeAddProductModal();
  renderProducts();
  renderSellBtn();
  showToast(`✓ ${name} 已新增`);
}

// 用本地時區格式化日期，避免 toISOString() 的 UTC 時差問題
function formatLocalDate(d) {
  const yyyy = d.getFullYear();
  const mm = String(d.getMonth() + 1).padStart(2, '0');
  const dd = String(d.getDate()).padStart(2, '0');
  return `${yyyy}-${mm}-${dd}`;
}

function prevDate() {
  const d = new Date(state.selectedDate + 'T00:00:00');
  d.setDate(d.getDate() - 1);
  state.selectedDate = formatLocalDate(d);
  renderLog();
}

function nextDate() {
  const d = new Date(state.selectedDate + 'T00:00:00');
  d.setDate(d.getDate() + 1);
  state.selectedDate = formatLocalDate(d);
  renderLog();
}

function jumpToToday() {
  state.selectedDate = formatLocalDate(new Date());
  renderLog();
}

function manualSync() {
  if (!APPS_SCRIPT_URL) {
    showToast('尚未設定 Apps Script URL');
    return;
  }
  fullSync();
}

let modalCallback = null;
function showModal(title, msg, cb) {
  document.getElementById('confirmTitle').textContent = title;
  document.getElementById('confirmMsg').textContent = msg;
  document.getElementById('confirmModal').classList.add('show');
  modalCallback = cb;
  document.getElementById('confirmOk').onclick = () => { closeModal(); if (modalCallback) modalCallback(); };
}
function closeModal() { document.getElementById('confirmModal').classList.remove('show'); }

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

document.getElementById('discountInput').addEventListener('input', renderSellBtn);

// Quantity input direct editing
document.addEventListener('input', function(e) {
  const actionInput = e.target.dataset.actionInput;
  if (!actionInput || actionInput === 'sellDate') return;
  const val = Math.max(1, parseInt(e.target.value) || 1);
  if (actionInput === 'sellQty') { state.qty = val; renderSellBtn(); }
  else if (actionInput === 'moveQty') { state.moveQty = val; }
  else if (actionInput === 'stockQty') { state.stockQty = val; }
});
document.addEventListener('blur', function(e) {
  const actionInput = e.target.dataset.actionInput;
  if (!actionInput || actionInput === 'sellDate') return;
  const val = Math.max(1, parseInt(e.target.value) || 1);
  e.target.value = val;
  if (actionInput === 'sellQty') { state.qty = val; renderSellBtn(); }
  else if (actionInput === 'moveQty') { state.moveQty = val; }
  else if (actionInput === 'stockQty') { state.stockQty = val; }
}, true);

document.addEventListener('click', function(e) {
  const el = e.target.closest('[data-action]');
  if (!el) return;
  e.preventDefault();
  const action = el.dataset.action;
  const id = el.dataset.id;
  if (actions[action]) {
    if (id !== undefined) actions[action](id);
    else actions[action]();
  }
});

// 日期手動輸入自動格式化（輸入數字自動補 - 或 :）
function autoFormatDate(el) {
  el.addEventListener('input', function(e) {
    let v = this.value.replace(/[^\d]/g, '');
    if (v.length > 4) v = v.slice(0,4) + '-' + v.slice(4);
    if (v.length > 7) v = v.slice(0,7) + '-' + v.slice(7);
    this.value = v.slice(0, 10);
  });
}
function autoFormatTime(el) {
  el.addEventListener('input', function(e) {
    let v = this.value.replace(/[^\d]/g, '');
    if (v.length > 2) v = v.slice(0,2) + ':' + v.slice(2);
    this.value = v.slice(0, 5);
  });
}
autoFormatDate(document.getElementById('sellDateInput'));
autoFormatDate(document.getElementById('stockDateInput'));
autoFormatTime(document.getElementById('stockTimeInput'));
